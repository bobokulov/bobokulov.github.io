<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt – Mirzokhid Bobokulov</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-body">
  <header class="site-header compact">
    <a class="brand" href="index.html"><span class="logo">MB</span><span class="flag"></span><span>Mirzokhid Bobokulov</span></a>
    <nav class="nav"><a href="index.html">Startseite</a><a href="kontakt.html" class="active">Kontakt</a><a href="impressum.html">Impressum</a><a href="datenschutz.html">Datenschutz</a></nav>
    <button class="theme-toggle" id="themeToggle">☼</button>
  </header>
  <main class="page-wrap">
    <section class="legal-card contact-card reveal">
      <p class="section-kicker">Kontakt aufnehmen</p>
      <h1>Nachricht senden</h1>
      <p>Für Anfragen, Kooperationen oder Beratungstermine können Sie das folgende Formular verwenden.</p>
      <form class="contact-form" action="https://formspree.io/f/mdarjdrd" method="POST">
        <label>Name<input type="text" name="name" autocomplete="name" required></label>
        <label>E-Mail<input type="email" name="email" autocomplete="email" required></label>
        <label>Betreff<input type="text" name="subject"></label>
        <label>Nachricht<textarea name="message" rows="7" required></textarea></label>
        <input type="hidden" name="_subject" value="Neue Nachricht über bobokulov.github.io">
        <button class="submit-btn" type="submit">Nachricht senden</button>
      </form>
    </section>
  </main>
  <footer class="footer"><p>© 2026 Mirzokhid Bobokulov</p><div><a href="impressum.html">Impressum</a><a href="datenschutz.html">Datenschutz</a></div></footer>
  <script src="script.js"></script>
</body>
</html>
